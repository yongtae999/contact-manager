<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 연락처 관리</title>
    
    <!-- 폰트 및 아이콘 -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Rounded" rel="stylesheet">
    
    <!-- Tesseract.js (명함 이미지 글자 인식 AI) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <!-- SheetJS (엑셀 다운로드 라이브러리) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

    <!-- 헤더 -->
    <header class="app-header">
        <div class="header-title" style="display: flex; align-items: center; gap: 4px;">
            <button onclick="history.back()" class="icon-btn" aria-label="이전으로" style="margin-right: 4px; padding: 4px;">
                <span class="material-icons-rounded">arrow_back</span>
            </button>
            <span class="material-icons-rounded" style="color: var(--primary);">contacts</span>
            <h1>스마트 연락처 관리</h1>
        </div>
        <button class="icon-btn" onclick="exportToExcel()" title="엑셀로 다운로드">
            <span class="material-icons-rounded">file_download</span>
        </button>
    </header>

    <main class="container">
        
        <!-- 주요 액션 버튼 -->
        <div class="action-cards">
            <!-- 명함 스캔 카메라 열기 -->
            <div class="action-card primary" onclick="document.getElementById('cameraInput').click()">
                <span class="material-icons-rounded">document_scanner</span>
                <h3>명함 스캔</h3>
                <p>사진을 찍어 자동 입력</p>
            </div>
            <!-- 수동 입력 -->
            <div class="action-card secondary" onclick="openFormModal()">
                <span class="material-icons-rounded">edit_square</span>
                <h3>수동 입력</h3>
                <p>명함 없이 직접 입력</p>
            </div>
        </div>

        <!-- 숨겨진 파일 입력 (카메라/앨범) -->
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="handleImageUpload(event)">

        <!-- 로딩 화면 (명함 분석 중) -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="spinner"></div>
            <p>명함의 글자를 AI가 분석 중입니다...<br><span style="font-size: 13px; opacity: 0.8;">약 5~10초 정도 소요될 수 있습니다.</span></p>
        </div>

        <!-- 연락처 리스트 -->
        <div class="list-section">
            <div class="list-header">
                <h2>저장된 연락처 (<span id="totalCount">0</span>)</h2>
                <div class="search-box">
                    <span class="material-icons-rounded">search</span>
                    <input type="text" id="searchInput" placeholder="이름 또는 소속 검색" oninput="filterContacts()">
                </div>
            </div>
            
            <div id="contactList" class="contact-list">
                <!-- 연락처 카드가 자바스크립트에 의해 여기에 추가됩니다. -->
                <div class="empty-state">저장된 연락처가 없습니다.</div>
            </div>
        </div>

    </main>

    <!-- 연락처 입력/수정 모달 -->
    <div id="formModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">새 연락처 추가</h3>
                <button class="icon-btn close-btn" onclick="closeFormModal()">
                    <span class="material-icons-rounded">close</span>
                </button>
            </div>
            
            <div class="modal-body">
                <p id="ocrNotice" style="display: none; color: #0ca678; font-size: 13px; margin-bottom: 15px; background: #e6fcf5; padding: 10px; border-radius: 8px;">
                    ✨ 사진에서 추출한 정보입니다. 잘못된 글자가 있다면 수정해 주세요!
                </p>
                <form id="contactForm">
                    <input type="hidden" id="contactId">
                    <div class="form-group">
                        <label>소속 (회사/기관명)</label>
                        <input type="text" id="orgInput" placeholder="예: 야생생물관리협회">
                    </div>
                    <div class="form-group">
                        <label>직위/직급</label>
                        <input type="text" id="titleInput" placeholder="예: 지부장, 대리">
                    </div>
                    <div class="form-group">
                        <label>성명 *</label>
                        <input type="text" id="nameInput" placeholder="예: 홍길동" required>
                    </div>
                    <div class="form-group">
                        <label>휴대폰 번호 *</label>
                        <input type="tel" id="phoneInput" placeholder="예: 010-1234-5678" required>
                    </div>
                    <div class="form-group">
                        <label>일반전화</label>
                        <input type="tel" id="telInput" placeholder="예: 02-123-4567">
                    </div>
                    <div class="form-group">
                        <label>이메일 주소</label>
                        <input type="email" id="emailInput" placeholder="예: example@email.com">
                    </div>
                    <div class="form-group">
                        <label>비고 (메모)</label>
                        <textarea id="memoInput" placeholder="기타 특징이나 메모를 입력하세요" style="width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 16px; font-family: inherit; resize: vertical; min-height: 80px;"></textarea>
                    </div>
                </form>
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeFormModal()">취소</button>
                <button class="btn btn-primary" onclick="saveContact()">저장하기</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
